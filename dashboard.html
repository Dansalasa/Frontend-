<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nabaichi Seed – Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body onload="loadProfile()">

<!-- Background collage -->
<div class="bg-collage">
  <img src="Imagebg1.jpg">
  <img src="Imagebg2.jpg">
  <img src="Imagebg3.jpg">
  <img src="Imagebg4.jpg">
  <img src="Imagebg5.jpg">
  <img src="Imagebg6.jpg">
  <img src="Imagebg7.jpg">
  <img src="Imagebg8.jpg">
</div>

<!-- Header -->
<header>
  <h2>NABAICHI SEED</h2>

  <div class="menu">
    <span onclick="toggleMenu()">⋮</span>

    <ul id="menuList" class="hidden">
      <li onclick="goPage('people.html')">People</li>
      <li onclick="goPage('profile.html')">Profile</li>
      <li onclick="goPage('coins.html')">Coins</li>
      <li onclick="goPage('about-kafur.html')">About Kafur Festival</li>
      <li onclick="goPage('about-nabaichi.html')">About Nabaichi Seed</li>
      <li class="logout" onclick="logout()">Logout</li>
    </ul>
  </div>
</header>

<!-- Main -->
<main>
  <h1>Welcome, <span id="username">User</span></h1>
  <p>You have <strong><span id="coins">0</span> Coins</strong></p>
  <p>Your Ticket: <span id="ticket">No Ticket</span></p>
  <p>Vote, connect and explore.</p>
</main>

<!-- Haɗa main.js -->
<script src="main.js"></script>

<!-- Ƙananan functions -->
<script>
  function toggleMenu(){
    document.getElementById("menuList").classList.toggle("hidden");
  }

  function goPage(page){
    window.location.href = page;
  }

  function logout(){
    localStorage.removeItem("token");
    localStorage.removeItem("email");
    window.location.href = "login.html";
  }
</script>

</body>
</html>
